name: nexus-rag

networks:
  default:
    name: nexus-rag-net

volumes:
  postgres-data:
  qdrant-data:
  ollama-data:
  reranker-cache:
  ingestion-worker-cache:
  orchestration-mcp-cache:
  mongo-data:
  # NFR-12: original uploaded files, independent of Qdrant/Postgres. Shared
  # across ingestion-api and (once NFR-11 lands) ingestion-worker -- fine for
  # this single-node dev stack; production uses S3ObjectStore instead, which
  # doesn't have this same-filesystem constraint (see helm's externalObjectStore).
  object-store-data:
  nats-data:

services:
  # ---------------------------------------------------------------- storage
  postgres:
    # NFR-16: pinned to a specific patch release, not the floating "16" tag
    # -- same reasoning applies to every other image in this file that used
    # to say :latest, main-latest, or a bare major version.
    image: postgres:16.14
    environment:
      # POSTGRES_USER/PASSWORD stays the bootstrap superuser -- NFR-3: never
      # used for day-to-day app or Keycloak traffic (see APP_DB_USER/
      # KEYCLOAK_DB_USER below and infra/postgres/init-app-roles.sh, which
      # creates both as separate, non-superuser roles on first boot).
      POSTGRES_USER: ${POSTGRES_USER:-nexus_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_rag}
      POSTGRES_DB: ${POSTGRES_DB:-nexus_rag}
      APP_DB_USER: ${APP_DB_USER:-nexus_rag_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-nexus_rag_app}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-keycloak_app}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_app}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME:-keycloak}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-app-roles.sh:/docker-entrypoint-initdb.d/init-app-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus_rag}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.18.2
    environment:
      # NFR-15: require authenticated access even in dev -- anonymous
      # read/write to the vector store is never acceptable, network
      # isolation alone doesn't satisfy NFR-2's auditability (an
      # unauthenticated store can't attribute access to an identity).
      # Health check probes (/readyz, /livez, and this service's own TCP
      # healthcheck below) are exempt from Qdrant's own API-key enforcement.
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-dev-qdrant-key}
      QDRANT__SERVICE__READ_ONLY_API_KEY: ${QDRANT_READ_ONLY_API_KEY:-dev-qdrant-readonly-key}
    ports:
      # Bound to localhost only -- nothing on the host network beyond this
      # machine should reach it directly; other containers still reach it
      # via the internal nexus-rag-net DNS name (qdrant:6333) regardless of
      # this host port binding.
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------ queue
  nats:
    # NFR-11: durable ingestion job queue (common/job_queue.py) -- JetStream
    # (-js) gives ack/redelivery semantics so a worker crash or restart
    # mid-processing doesn't silently strand a document, unlike the
    # FastAPI BackgroundTasks mechanism this replaces. -sd persists stream
    # data to the mounted volume; -m exposes the monitoring HTTP endpoint
    # (port 8222, unauthenticated by design, used by the healthcheck below)
    # separate from the client protocol port (4222, which --auth protects).
    image: nats:2.14.3-alpine
    command: ["-js", "-sd", "/data", "-m", "8222", "--auth", "${NATS_AUTH_TOKEN:-dev-nats-token}"]
    volumes:
      - nats-data:/data
    ports:
      # Bound to localhost only, same reasoning as qdrant's port binding
      # above -- other containers reach it via nats:4222 regardless.
      - "127.0.0.1:4222:4222"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -------------------------------------------------------------- identity
  keycloak:
    # NFR-16: pinned to a recent release, up from 26.2 (the version this
    # whole realm/OBO setup was originally debugged against -- see
    # docs/dev-setup.md's eight-bug Keycloak list). Still >= 26.2, so
    # RFC 8693 token exchange (Section 7.7) stays supported, but this bump
    # specifically deserves a full down -v / up / realm-import / login
    # retest before trusting it -- more so than the other pins in this
    # commit, given how many of those eight bugs were version-behavior
    # surprises, not code bugs.
    image: quay.io/keycloak/keycloak:26.7.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      # NFR-3: Keycloak's own database/role, separate from the app's -- see
      # postgres service's init-app-roles.sh.
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak_app}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_app}
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realm-export:/opt/keycloak/data/import
    ports:
      - "8080:8080"
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # KC_HEALTH_ENABLED moves /health* onto Keycloak's separate management
      # interface (default port 9000) rather than the main HTTP port (8080)
      # -- confirmed against a real run's "Management interface listening on
      # http://0.0.0.0:9000" log line, not assumed. Probing 8080 here left
      # Keycloak permanently "unhealthy" despite serving real traffic fine,
      # which blocked every service with depends_on: keycloak: condition:
      # service_healthy from ever starting.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'UP' <&3"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # --------------------------------------------------------------- serving
  ollama:
    image: ollama/ollama:0.32.1
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama-model-init:
    image: ollama/ollama:0.32.1
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      GENERATION_MODEL: ${GENERATION_MODEL:-llama3.2:1b}
    entrypoint: ["sh", "-c"]
    command:
      - |
        ollama pull "$$EMBEDDING_MODEL" && ollama pull "$$GENERATION_MODEL"
    restart: "no"

  reranker-service:
    build:
      context: .
      dockerfile: services/reranker-service/Dockerfile
    volumes:
      - reranker-cache:/srv/.cache/huggingface
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --------------------------------------------------------- custom services
  ingestion-api:
    build:
      context: .
      dockerfile: services/ingestion-api/Dockerfile
    environment:
      # NFR-3: non-superuser app role, distinct from POSTGRES_USER -- see
      # postgres service's init-app-roles.sh.
      DATABASE_URL: postgresql+psycopg://${APP_DB_USER:-nexus_rag_app}:${APP_DB_PASSWORD:-nexus_rag_app}@postgres:5432/${POSTGRES_DB:-nexus_rag}
      OIDC_ISSUERS: http://keycloak:8080/realms/nexus-rag,http://localhost:8080/realms/nexus-rag
      OIDC_AUDIENCE: rag-app
      # Browser OIDC login (ARCHITECTURE.md Section 4.4). RAG_APP_KEYCLOAK_CLIENT_SECRET
      # is the same var already used by seed-sample-data/eval-retrieval below -- rag-app
      # is a confidential client, so the auth-code/refresh token exchanges in
      # app/routes/auth.py and app/deps.py are server-to-server. COOKIE_SECURE=false
      # because this dev stack serves the UI over plain http://localhost, where a
      # Secure-flagged cookie would never come back.
      OIDC_CLIENT_ID: rag-app
      RAG_APP_KEYCLOAK_CLIENT_SECRET: ${RAG_APP_KEYCLOAK_CLIENT_SECRET:-dev-rag-app-secret}
      OIDC_REDIRECT_URI: http://localhost:8001/auth/callback
      COOKIE_SECURE: "false"
      QDRANT_URL: http://qdrant:6333
      # NFR-15: full read/write key -- app/routes/curate.py updates/deletes
      # points directly (approve/reject/supersede); ingestion-worker (below)
      # is the one that now creates the collection and writes new points.
      QDRANT_API_KEY: ${QDRANT_API_KEY:-dev-qdrant-key}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}
      # app/routes/search.py's query-testing page proxies here, forwarding the
      # logged-in user's own access token (ARCHITECTURE.md Section 4.3).
      ORCHESTRATION_MCP_URL: http://orchestration-mcp:8002
      # NFR-12: durable original-file storage -- filesystem here (dev-only,
      # see common/object_store.py's FilesystemObjectStore); production uses
      # OBJECT_STORE_BACKEND=s3 (helm's externalObjectStore).
      OBJECT_STORE_BACKEND: filesystem
      OBJECT_STORE_PATH: /srv/object-store
      # NFR-11: publishes a job here on submit; ingestion-worker consumes it.
      NATS_URL: nats://nats:4222
      NATS_AUTH_TOKEN: ${NATS_AUTH_TOKEN:-dev-nats-token}
    volumes:
      - object-store-data:/srv/object-store
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      qdrant:
        condition: service_started
      nats:
        condition: service_healthy
      orchestration-mcp:
        condition: service_started

  ingestion-worker:
    # NFR-11: the durable consumer side of the queue ingestion-api publishes
    # to above -- actually does the parse/chunk/embed/store pipeline
    # (FR-3..FR-6), out of process so a crash mid-document doesn't strand it
    # (see services/ingestion-worker/app/processing.py).
    build:
      context: .
      dockerfile: services/ingestion-worker/Dockerfile
    environment:
      # NFR-3: non-superuser app role, distinct from POSTGRES_USER -- see
      # postgres service's init-app-roles.sh.
      DATABASE_URL: postgresql+psycopg://${APP_DB_USER:-nexus_rag_app}:${APP_DB_PASSWORD:-nexus_rag_app}@postgres:5432/${POSTGRES_DB:-nexus_rag}
      QDRANT_URL: http://qdrant:6333
      # NFR-15: full read/write key -- this is now the service that creates
      # the collection and writes points, moved out of ingestion-api.
      QDRANT_API_KEY: ${QDRANT_API_KEY:-dev-qdrant-key}
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      CHUNK_TARGET_WORDS: ${CHUNK_TARGET_WORDS:-512}
      CHUNK_OVERLAP_RATIO: ${CHUNK_OVERLAP_RATIO:-0.15}
      OBJECT_STORE_BACKEND: filesystem
      OBJECT_STORE_PATH: /srv/object-store
      NATS_URL: nats://nats:4222
      NATS_AUTH_TOKEN: ${NATS_AUTH_TOKEN:-dev-nats-token}
    volumes:
      - ingestion-worker-cache:/srv/.cache/huggingface
      - object-store-data:/srv/object-store
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      nats:
        condition: service_healthy
      ollama-model-init:
        condition: service_completed_successfully

  orchestration-mcp:
    build:
      context: .
      dockerfile: services/orchestration-mcp/Dockerfile
    environment:
      # NFR-3: non-superuser app role, distinct from POSTGRES_USER -- see
      # postgres service's init-app-roles.sh.
      DATABASE_URL: postgresql+psycopg://${APP_DB_USER:-nexus_rag_app}:${APP_DB_PASSWORD:-nexus_rag_app}@postgres:5432/${POSTGRES_DB:-nexus_rag}
      OIDC_ISSUERS: http://keycloak:8080/realms/nexus-rag,http://localhost:8080/realms/nexus-rag
      OIDC_AUDIENCE: rag-app
      QDRANT_URL: http://qdrant:6333
      # NFR-15: read-only key -- this service only ever calls query_points
      # (app/rag_search.py), never writes to Qdrant.
      QDRANT_API_KEY: ${QDRANT_READ_ONLY_API_KEY:-dev-qdrant-readonly-key}
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      RERANKER_URL: http://reranker-service:8003
    volumes:
      - orchestration-mcp-cache:/srv/.cache/huggingface
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      qdrant:
        condition: service_started
      reranker-service:
        condition: service_healthy

  harden-audit-log:
    # NFR-2: audit_log must be append-only from the app's own DB credentials
    # (APP_DB_USER, not the postgres superuser). Can't do this from
    # postgres's docker-entrypoint-initdb.d (init-app-roles.sh) -- the
    # audit_log table doesn't exist yet at that point, it's created by
    # SQLModel's create_all() (common/db.py's init_db(), called from
    # ingestion-api's lifespan) the first time that service starts. Runs
    # once ingestion-api reports healthy, connecting as the bootstrap
    # superuser (the only other place besides init-app-roles.sh that ever
    # does) to reassign table ownership away from APP_DB_USER entirely --
    # not just REVOKE while it's still the owner, which it could trivially
    # undo (owners always retain GRANT on their own objects; only losing
    # ownership outright closes that).
    image: postgres:16.14
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-nexus_rag}
    command:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -h
      - postgres
      - -U
      - ${POSTGRES_USER:-nexus_rag}
      - -d
      - ${POSTGRES_DB:-nexus_rag}
      - -c
      - >-
        ALTER TABLE audit_log OWNER TO "${POSTGRES_USER:-nexus_rag}";
        REVOKE ALL ON audit_log FROM "${APP_DB_USER:-nexus_rag_app}";
        GRANT SELECT, INSERT ON audit_log TO "${APP_DB_USER:-nexus_rag_app}";
    depends_on:
      ingestion-api:
        condition: service_healthy
    restart: "no"

  seed-sample-data:
    build:
      context: .
      dockerfile: scripts/Dockerfile
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      INGESTION_API_URL: http://ingestion-api:8001
      RAG_APP_KEYCLOAK_CLIENT_SECRET: ${RAG_APP_KEYCLOAK_CLIENT_SECRET:-dev-rag-app-secret}
    depends_on:
      ingestion-api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      ollama-model-init:
        condition: service_completed_successfully
    restart: "no"

  # FR-30/FR-32: not started by a plain `docker compose up` -- run on demand
  # with `docker compose --profile eval run --rm eval-retrieval` once the
  # stack (and seed-sample-data) has finished, per "periodically re-evaluate".
  eval-retrieval:
    profiles: ["eval"]
    build:
      context: .
      dockerfile: scripts/Dockerfile
    command: ["python3", "evaluate_retrieval.py"]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      ORCHESTRATION_MCP_URL: http://orchestration-mcp:8002
      RAG_APP_KEYCLOAK_CLIENT_SECRET: ${RAG_APP_KEYCLOAK_CLIENT_SECRET:-dev-rag-app-secret}
    depends_on:
      orchestration-mcp:
        condition: service_healthy
      seed-sample-data:
        condition: service_completed_successfully
    restart: "no"

  # ---------------------------------------------------- throwaway MPNexus stack
  mongodb:
    image: mongo:7.0.31
    volumes:
      - mongo-data:/data/db

  litellm:
    # NFR-16: pinned, up from the moving main-latest tag -- researched as
    # the current release at pin time, not exhaustively verified to pull
    # cleanly (this is C7's "entirely LibreChat's own pipeline, not this
    # project's concern" territory, so lower scrutiny than Keycloak above).
    image: ghcr.io/berriai/litellm:v1.93.0
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-dev-litellm-master-key}
    ports:
      - "4000:4000"
    depends_on:
      - ollama-model-init

  librechat:
    # NFR-16: pinned, up from :latest -- deliberately held at v0.8.7 rather
    # than whatever's newest, since that's the exact version Section 7.7's
    # OBO/addUserJwtToken integration recipe was verified against
    # (REQUIREMENTS.md: "LibreChat 0.8.7 (confirmed version in use)").
    # Bumping past it would mean re-verifying that recipe, not just pinning.
    image: ghcr.io/danny-avila/librechat:v0.8.7
    volumes:
      - ./infra/librechat/librechat.yaml:/app/librechat.yaml:ro
    environment:
      HOST: 0.0.0.0
      PORT: 3080
      MONGO_URI: mongodb://mongodb:27017/LibreChat
      OPENID_ISSUER: http://keycloak:8080/realms/nexus-rag
      OPENID_CLIENT_ID: librechat
      OPENID_CLIENT_SECRET: ${LIBRECHAT_KEYCLOAK_CLIENT_SECRET:-dev-librechat-secret}
      OPENID_CALLBACK_URL: /oauth/openid/callback
      OPENID_SESSION_SECRET: dev-session-secret-change-me
      OPENID_USE_PKCE: "true"
      OPENID_REUSE_TOKENS: "true"
      # LibreChat's own session JWTs (separate from Keycloak's OIDC tokens) --
      # required at startup regardless of auth method, confirmed live: LibreChat
      # refuses to start ("JwtStrategy requires a secret or key") without these.
      # No fixed-length requirement (any string works as an HMAC secret), unlike
      # CREDS_KEY/CREDS_IV below.
      JWT_SECRET: ${LIBRECHAT_JWT_SECRET:-6d5695c76c088051803a2711a694dc2a8c3e184b97ca2696639b663e289cb6bd}
      JWT_REFRESH_SECRET: ${LIBRECHAT_JWT_REFRESH_SECRET:-e6ee049ff1278d2d966accf4a498589cfa8f2e90a239a36195ecea193606444c}
      # AES-256-CBC key/IV LibreChat uses to encrypt credentials it stores in
      # MongoDB (e.g. user-provided plugin API keys) -- also required at
      # startup, and unlike JWT_SECRET/JWT_REFRESH_SECRET these have a strict
      # length requirement LibreChat validates: CREDS_KEY must decode to exactly
      # 32 bytes (64 hex chars), CREDS_IV to exactly 16 bytes (32 hex chars).
      # Generated with `openssl rand -hex 32` / `openssl rand -hex 16`.
      CREDS_KEY: ${LIBRECHAT_CREDS_KEY:-b981603e3853e792749bd57a37263dcac98f05e9bcc3221b28ea9ce1d31407f6}
      CREDS_IV: ${LIBRECHAT_CREDS_IV:-59ac382baf239caa9f8bb22863d45e41}
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
      - keycloak
      - litellm
      - orchestration-mcp

# Default values for nexus-rag.
#
# Scope (NFR-10): this chart deploys only the *new* components this project
# adds -- ingestion-api, orchestration-mcp, reranker-service, a dedicated
# embedding-serving Ollama instance, and Qdrant. It assumes LibreChat,
# LiteLLM, Keycloak, and the cluster's existing generation-serving vLLM/Ollama
# (C7) are already deployed and managed separately, and integrates with them
# via the config below rather than deploying or bundling them.
#
# Assumption called out explicitly (REQUIREMENTS.md doesn't name Postgres
# among NFR-10's scoped components, unlike Qdrant): a Postgres instance is
# also treated as existing cluster infrastructure this chart connects to,
# not something it deploys. If that's wrong for your environment, this is
# the section to revisit first.

global:
  # Air-gapped registry (NFR-1) every image below is mirrored into. Prefixed
  # onto each component's image.repository unless that component sets its
  # own fully-qualified repository.
  imageRegistry: "registry.internal.example.mil/nexus-rag"
  imagePullSecrets: []
  # Standard labels applied to every resource this chart creates.
  labels: {}

# ---------------------------------------------------------------------------
# External dependencies (not deployed by this chart)
# ---------------------------------------------------------------------------

externalPostgres:
  # Pre-created Secret containing the full SQLAlchemy DATABASE_URL
  # (postgresql+psycopg://user:pass@host:5432/dbname) under secretKey.
  # Created out-of-band by your cluster's secrets process, not by this chart.
  # NFR-6 (encryption at rest): since Postgres is external to this chart,
  # its storage encryption is entirely your existing Postgres deployment's
  # responsibility -- not something a DATABASE_URL or Secret reference can
  # configure from here. See helm/nexus-rag/README.md's "Encryption at rest"
  # section.
  existingSecret: "nexus-rag-db"
  secretKey: "database-url"

externalKeycloak:
  # Passed through as OIDC_ISSUERS (common/claims.py accepts a comma-separated
  # list there, for the dev Compose stack's two-hostnames-one-Keycloak problem --
  # see that file's comment). Production has one real Keycloak behind one
  # canonical hostname, so a single value here is all that's ever needed.
  issuerUrl: "https://keycloak.example.mil/realms/nexus-rag"
  audience: "rag-app"
  # Browser OIDC Authorization Code + PKCE login for the ingestion UI
  # (ARCHITECTURE.md Section 4.4). clientId matches the confidential client
  # already configured per REQUIREMENTS.md Section 6.2 (dev stack: rag-app,
  # infra/keycloak/realm-export/nexus-rag-realm.json).
  clientId: "rag-app"
  # rag-app is a confidential client -- its secret comes from a pre-created
  # Secret (same pattern as externalPostgres.existingSecret above), never a
  # plain value here. The Secret must contain a key matching secretKey below.
  clientSecret:
    existingSecret: "nexus-rag-keycloak-client-secret"
    secretKey: "client-secret"

externalObjectStore:
  # NFR-12: durable storage for original uploaded files, independent of
  # Qdrant/Postgres (common/object_store.py). Only the S3-compatible backend
  # is meaningful here -- the filesystem backend (common/object_store.py's
  # FilesystemObjectStore) is dev-Compose-only, since it assumes a single
  # shared filesystem across every reader/writer, which doesn't hold once
  # ingestion-api and ingestion-worker are separate pods. Any S3-compatible
  # endpoint works: an existing enterprise S3, Ceph RGW, MinIO, etc.
  endpoint: "https://s3.example.mil"
  bucket: "nexus-rag-documents"
  region: "us-gov-west-1"
  # Pre-created Secret (out-of-band, same pattern as externalPostgres above)
  # containing both keys named below.
  existingSecret: "nexus-rag-object-store"
  accessKeySecretKey: "access-key"
  secretKeySecretKey: "secret-key"

# ---------------------------------------------------------------------------
# Qdrant (C3 -- already decided; new to the cluster, so this chart deploys it
# directly rather than depending on an external Helm chart repo, which would
# need its own air-gapped mirroring step)
# ---------------------------------------------------------------------------

qdrant:
  enabled: true
  image:
    repository: qdrant/qdrant
    # NFR-16: pinned to a specific, recent release -- never :latest.
    tag: "v1.18.2"
  replicas: 1
  # NFR-15: Qdrant must require authenticated access -- pre-created Secret
  # (out-of-band, same existingSecret pattern as externalPostgres/
  # externalKeycloak) with two keys: a full read/write key (ingestion-api,
  # which creates the collection and writes/deletes points) and a read-only
  # key (orchestration-mcp, which only ever queries). One Secret, two keys,
  # rather than two Secrets, since they're issued and rotated together.
  apiKey:
    existingSecret: "nexus-rag-qdrant-keys"
    secretKey: "api-key"
    readOnlySecretKey: "read-only-api-key"
  service:
    httpPort: 6333
    grpcPort: 6334
  persistence:
    size: 50Gi
    # NFR-6 (encryption at rest): set this to a StorageClass backed by
    # encrypted volumes -- disk/volume encryption is a StorageClass-level
    # (or underlying block-storage-level) property, not something this
    # chart or Qdrant itself can turn on. Empty string uses the cluster's
    # default StorageClass as-is, whatever that provides. See
    # helm/nexus-rag/README.md's "Encryption at rest" section.
    storageClassName: ""
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

# ---------------------------------------------------------------------------
# NATS JetStream (NFR-11 -- durable ingestion job queue, common/job_queue.py).
# New to the cluster, hand-deployed here for the same reason as qdrant above:
# avoids depending on an external Helm chart repo, which would need its own
# air-gapped mirroring step.
# ---------------------------------------------------------------------------

nats:
  enabled: true
  image:
    repository: nats
    tag: "2.14.3-alpine"
  replicas: 1
  service:
    clientPort: 4222
    monitorPort: 8222
  persistence:
    size: 10Gi
    # NFR-6: see qdrant.persistence.storageClassName's comment above -- same
    # applies here.
    storageClassName: ""
  # NFR-11: shared token auth between ingestion-api (publisher) and
  # ingestion-worker (consumer) -- pre-created Secret, same existingSecret
  # pattern as externalPostgres/externalKeycloak.
  authToken:
    existingSecret: "nexus-rag-nats-token"
    secretKey: "token"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# ---------------------------------------------------------------------------
# Dedicated embedding-serving Ollama (NFR-8: a separate GPU allocation from
# the cluster's existing generation-serving vLLM/Ollama, not the same
# deployment as C7's chat-generation instance)
# ---------------------------------------------------------------------------

embeddingService:
  enabled: true
  image:
    repository: ollama/ollama
    # NFR-16: pinned, never :latest.
    tag: "0.32.1"
  model: "nomic-embed-text"
  replicas: 1
  service:
    port: 11434
  persistence:
    size: 20Gi
    # NFR-6: see qdrant.persistence.storageClassName's comment above -- same
    # applies here.
    storageClassName: ""
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
      nvidia.com/gpu: "1"
    limits:
      cpu: "2"
      memory: "8Gi"
      nvidia.com/gpu: "1"

# ---------------------------------------------------------------------------
# reranker-service (FR-25)
# ---------------------------------------------------------------------------

rerankerService:
  enabled: true
  image:
    repository: reranker-service
    # NFR-16: matches Chart.yaml's appVersion, not :latest -- there's no CI
    # pipeline yet that builds/pushes a version-tagged image for this
    # first-party service, so this is a placeholder for the convention
    # ("build and push something tagged to match this") rather than a
    # value already backed by an existing tagged image. Bump alongside
    # Chart.yaml's appVersion when that pipeline exists.
    tag: "0.1.0"
  model: "cross-encoder/ms-marco-MiniLM-L6-v2"
  replicas: 1
  service:
    port: 8003
  persistence:
    size: 5Gi
    # NFR-6: see qdrant.persistence.storageClassName's comment above -- same
    # applies here.
    storageClassName: ""
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

# ---------------------------------------------------------------------------
# ingestion-api (FR-1..FR-9, FR-10..FR-16)
# ---------------------------------------------------------------------------

ingestionApi:
  enabled: true
  image:
    repository: ingestion-api
    # NFR-16: see rerankerService.image.tag's comment -- same "placeholder
    # for the convention, no versioned-image CI pipeline yet" caveat.
    tag: "0.1.0"
  replicas: 2
  # FR-9/NFR-7: upload size guard in bytes.
  maxUploadBytes: 52428800
  # FR-4: chunking target size (words) and overlap ratio -- Section 2's
  # starting point.
  chunkTargetWords: 512
  chunkOverlapRatio: 0.15
  service:
    type: ClusterIP
    port: 8001
  ingress:
    enabled: false
    className: ""
    host: "rag-ingest.example.mil"
    tls: []
  # Browser OIDC login callback URL (ARCHITECTURE.md Section 4.4), passed
  # through as OIDC_REDIRECT_URI. Empty (default) derives it from
  # ingress.host above -- https if ingress.tls is set, http otherwise (see
  # _helpers.tpl's nexus-rag.oidcRedirectUri). Set this explicitly only if
  # ingress is disabled, or the externally-visible URL differs from the
  # ingress host (e.g. behind another proxy/load balancer this chart doesn't
  # manage).
  oidcRedirectUri: ""
  # Always true for any real (https) deployment -- a Secure-flagged cookie
  # never comes back over plain http. Compose's dev stack is the only place
  # this should ever be false (docker-compose.yml sets COOKIE_SECURE=false
  # there, since it serves the UI over http://localhost).
  cookieSecure: true
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# ---------------------------------------------------------------------------
# orchestration-mcp (FR-24..FR-29) -- registered with LibreChat as an MCP
# server out-of-band (LibreChat's own config, not this chart); this only
# deploys the service LibreChat's OBO-authenticated calls reach.
# ---------------------------------------------------------------------------

orchestrationMcp:
  enabled: true
  image:
    repository: orchestration-mcp
    # NFR-16: see rerankerService.image.tag's comment -- same "placeholder
    # for the convention, no versioned-image CI pipeline yet" caveat.
    tag: "0.1.0"
  replicas: 2
  service:
    type: ClusterIP
    port: 8002
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

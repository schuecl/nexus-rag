{{- if .Values.ingestionApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus-rag.fullname" . }}-ingestion-api
  labels:
    {{- include "nexus-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-api
spec:
  replicas: {{ .Values.ingestionApi.replicas }}
  selector:
    matchLabels:
      {{- include "nexus-rag.componentSelectorLabels" (dict "root" . "component" "ingestion-api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus-rag.labels" . | nindent 8 }}
        app.kubernetes.io/component: ingestion-api
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "nexus-rag.podSecurityContext" . | nindent 8 }}
      containers:
        - name: ingestion-api
          image: {{ include "nexus-rag.image" (dict "global" .Values.global "image" .Values.ingestionApi.image) }}
          securityContext:
            {{- include "nexus-rag.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8001
          volumeMounts:
            # FastAPI/python-multipart spool uploaded files (FR-1) to /tmp
            # once they exceed an in-memory threshold; needed alongside
            # readOnlyRootFilesystem above.
            - name: tmp
              mountPath: /tmp
            # common.sparse_embedding's BM25 model cache (HF_HOME in the
            # Dockerfile). No PVC here (unlike reranker-service/
            # embedding-service) -- an emptyDir just formalizes the same
            # ephemeral, redownload-on-restart behavior this already had
            # before readOnlyRootFilesystem made the container's own
            # writable layer unavailable. Give it a real PVC if that
            # redownload cost becomes a problem.
            - name: hf-cache
              mountPath: /srv/.cache/huggingface
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalPostgres.existingSecret }}
                  key: {{ .Values.externalPostgres.secretKey }}
            - name: OIDC_ISSUERS
              value: {{ .Values.externalKeycloak.issuerUrl | quote }}
            - name: OIDC_AUDIENCE
              value: {{ .Values.externalKeycloak.audience | quote }}
            # Browser OIDC login (ARCHITECTURE.md Section 4.4).
            - name: OIDC_CLIENT_ID
              value: {{ .Values.externalKeycloak.clientId | quote }}
            - name: RAG_APP_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalKeycloak.clientSecret.existingSecret }}
                  key: {{ .Values.externalKeycloak.clientSecret.secretKey }}
            - name: OIDC_REDIRECT_URI
              value: {{ include "nexus-rag.oidcRedirectUri" . | quote }}
            - name: COOKIE_SECURE
              value: {{ .Values.ingestionApi.cookieSecure | quote }}
            - name: QDRANT_URL
              value: "http://{{ include "nexus-rag.fullname" . }}-qdrant:{{ .Values.qdrant.service.httpPort }}"
            # NFR-15: full read/write key -- this service creates the
            # collection and writes/deletes points (common/qdrant_store.py).
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.qdrant.apiKey.existingSecret }}
                  key: {{ .Values.qdrant.apiKey.secretKey }}
            - name: OLLAMA_URL
              value: "http://{{ include "nexus-rag.fullname" . }}-embedding-service:{{ .Values.embeddingService.service.port }}"
            - name: EMBEDDING_MODEL
              value: {{ .Values.embeddingService.model | quote }}
            - name: MAX_UPLOAD_BYTES
              value: {{ .Values.ingestionApi.maxUploadBytes | quote }}
            - name: CHUNK_TARGET_WORDS
              value: {{ .Values.ingestionApi.chunkTargetWords | quote }}
            - name: CHUNK_OVERLAP_RATIO
              value: {{ .Values.ingestionApi.chunkOverlapRatio | quote }}
            # app/routes/search.py's query-testing page proxies here (ARCHITECTURE.md
            # Section 4.3's /debug/rag_search, same as docker-compose.yml's dev wiring).
            - name: ORCHESTRATION_MCP_URL
              value: "http://{{ include "nexus-rag.fullname" . }}-orchestration-mcp:{{ .Values.orchestrationMcp.service.port }}"
            # NFR-12: durable original-file storage (common/object_store.py).
            - name: OBJECT_STORE_BACKEND
              value: "s3"
            - name: OBJECT_STORE_S3_ENDPOINT
              value: {{ .Values.externalObjectStore.endpoint | quote }}
            - name: OBJECT_STORE_S3_BUCKET
              value: {{ .Values.externalObjectStore.bucket | quote }}
            - name: OBJECT_STORE_S3_REGION
              value: {{ .Values.externalObjectStore.region | quote }}
            - name: OBJECT_STORE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalObjectStore.existingSecret }}
                  key: {{ .Values.externalObjectStore.accessKeySecretKey }}
            - name: OBJECT_STORE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalObjectStore.existingSecret }}
                  key: {{ .Values.externalObjectStore.secretKeySecretKey }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ingestionApi.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: hf-cache
          emptyDir: {}
{{- end }}

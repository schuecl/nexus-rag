{{- if .Values.ingestionWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus-rag.fullname" . }}-ingestion-worker
  labels:
    {{- include "nexus-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-worker
spec:
  replicas: {{ .Values.ingestionWorker.replicas }}
  selector:
    matchLabels:
      {{- include "nexus-rag.componentSelectorLabels" (dict "root" . "component" "ingestion-worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus-rag.labels" . | nindent 8 }}
        app.kubernetes.io/component: ingestion-worker
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "nexus-rag.podSecurityContext" . | nindent 8 }}
      containers:
        - name: ingestion-worker
          image: {{ include "nexus-rag.image" (dict "global" .Values.global "image" .Values.ingestionWorker.image) }}
          securityContext:
            {{- include "nexus-rag.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8004
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # common.sparse_embedding's BM25 model cache (HF_HOME in the
            # Dockerfile) -- see ingestion-api-deployment.yaml's identical
            # note on why this is an emptyDir rather than a PVC.
            - name: hf-cache
              mountPath: /srv/.cache/huggingface
          env:
            # NFR-3: non-superuser app role, distinct from POSTGRES_USER.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalPostgres.existingSecret }}
                  key: {{ .Values.externalPostgres.secretKey }}
            - name: QDRANT_URL
              value: "http://{{ include "nexus-rag.fullname" . }}-qdrant:{{ .Values.qdrant.service.httpPort }}"
            # NFR-15: full read/write key -- this is the service that now
            # creates the collection and writes new points (moved out of
            # ingestion-api).
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.qdrant.apiKey.existingSecret }}
                  key: {{ .Values.qdrant.apiKey.secretKey }}
            - name: OLLAMA_URL
              value: "http://{{ include "nexus-rag.fullname" . }}-embedding-service:{{ .Values.embeddingService.service.port }}"
            - name: EMBEDDING_MODEL
              value: {{ .Values.embeddingService.model | quote }}
            # FR-4: chunking target size (words) and overlap ratio.
            - name: CHUNK_TARGET_WORDS
              value: {{ .Values.ingestionWorker.chunkTargetWords | quote }}
            - name: CHUNK_OVERLAP_RATIO
              value: {{ .Values.ingestionWorker.chunkOverlapRatio | quote }}
            # NFR-12: durable original-file storage (common/object_store.py).
            - name: OBJECT_STORE_BACKEND
              value: "s3"
            - name: OBJECT_STORE_S3_ENDPOINT
              value: {{ .Values.externalObjectStore.endpoint | quote }}
            - name: OBJECT_STORE_S3_BUCKET
              value: {{ .Values.externalObjectStore.bucket | quote }}
            - name: OBJECT_STORE_S3_REGION
              value: {{ .Values.externalObjectStore.region | quote }}
            - name: OBJECT_STORE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalObjectStore.existingSecret }}
                  key: {{ .Values.externalObjectStore.accessKeySecretKey }}
            - name: OBJECT_STORE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalObjectStore.existingSecret }}
                  key: {{ .Values.externalObjectStore.secretKeySecretKey }}
            # NFR-11: durable ingestion queue -- ingestion-api publishes,
            # this service is the durable JetStream consumer.
            - name: NATS_URL
              value: "nats://{{ include "nexus-rag.fullname" . }}-nats:{{ .Values.nats.service.clientPort }}"
            - name: NATS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nats.authToken.existingSecret }}
                  key: {{ .Values.nats.authToken.secretKey }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ingestionWorker.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: hf-cache
          emptyDir: {}
{{- end }}

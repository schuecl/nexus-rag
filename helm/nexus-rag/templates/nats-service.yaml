{{- if .Values.nats.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus-rag.fullname" . }}-nats
  labels:
    {{- include "nexus-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: nats
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.nats.service.clientPort }}
      targetPort: client
      protocol: TCP
      name: client
    - port: {{ .Values.nats.service.monitorPort }}
      targetPort: monitor
      protocol: TCP
      name: monitor
  selector:
    {{- include "nexus-rag.componentSelectorLabels" (dict "root" . "component" "nats") | nindent 4 }}
{{- end }}

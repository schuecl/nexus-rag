{{- if .Values.orchestrationMcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus-rag.fullname" . }}-orchestration-mcp
  labels:
    {{- include "nexus-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestration-mcp
spec:
  replicas: {{ .Values.orchestrationMcp.replicas }}
  selector:
    matchLabels:
      {{- include "nexus-rag.componentSelectorLabels" (dict "root" . "component" "orchestration-mcp") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nexus-rag.labels" . | nindent 8 }}
        app.kubernetes.io/component: orchestration-mcp
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "nexus-rag.podSecurityContext" . | nindent 8 }}
      containers:
        - name: orchestration-mcp
          image: {{ include "nexus-rag.image" (dict "global" .Values.global "image" .Values.orchestrationMcp.image) }}
          securityContext:
            {{- include "nexus-rag.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8002
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # common.sparse_embedding's BM25 model cache (HF_HOME in the
            # Dockerfile) -- see ingestion-api-deployment.yaml's identical
            # note on why this is an emptyDir rather than a PVC.
            - name: hf-cache
              mountPath: /srv/.cache/huggingface
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalPostgres.existingSecret }}
                  key: {{ .Values.externalPostgres.secretKey }}
            - name: OIDC_ISSUERS
              value: {{ .Values.externalKeycloak.issuerUrl | quote }}
            - name: OIDC_AUDIENCE
              value: {{ .Values.externalKeycloak.audience | quote }}
            - name: QDRANT_URL
              value: "http://{{ include "nexus-rag.fullname" . }}-qdrant:{{ .Values.qdrant.service.httpPort }}"
            # NFR-15: read-only key -- this service only ever calls
            # query_points (app/rag_search.py), never writes to Qdrant.
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.qdrant.apiKey.existingSecret }}
                  key: {{ .Values.qdrant.apiKey.readOnlySecretKey }}
            - name: OLLAMA_URL
              value: "http://{{ include "nexus-rag.fullname" . }}-embedding-service:{{ .Values.embeddingService.service.port }}"
            - name: EMBEDDING_MODEL
              value: {{ .Values.embeddingService.model | quote }}
            - name: RERANKER_URL
              value: "http://{{ include "nexus-rag.fullname" . }}-reranker-service:{{ .Values.rerankerService.service.port }}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.orchestrationMcp.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: hf-cache
          emptyDir: {}
{{- end }}

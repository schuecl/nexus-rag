{{- if .Values.rerankerService.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "nexus-rag.fullname" . }}-reranker-service-cache
  labels:
    {{- include "nexus-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: reranker-service
spec:
  accessModes:
    - ReadWriteOnce
  {{- with .Values.rerankerService.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.rerankerService.persistence.size }}
{{- end }}

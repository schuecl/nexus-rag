{{- if .Values.ingestionApi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus-rag.fullname" . }}-ingestion-api
  labels:
    {{- include "nexus-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-api
spec:
  type: {{ .Values.ingestionApi.service.type }}
  ports:
    - port: {{ .Values.ingestionApi.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "nexus-rag.componentSelectorLabels" (dict "root" . "component" "ingestion-api") | nindent 4 }}
{{- end }}

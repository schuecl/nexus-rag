{{- if .Values.rerankerService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus-rag.fullname" . }}-reranker-service
  labels:
    {{- include "nexus-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: reranker-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.rerankerService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "nexus-rag.componentSelectorLabels" (dict "root" . "component" "reranker-service") | nindent 4 }}
{{- end }}

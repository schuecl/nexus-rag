# Throwaway dev LibreChat config (NFR-9). Only enough to exercise Keycloak
# login and the orchestration-mcp connection -- not a production config.
version: 1.2.8
cache: true

endpoints:
  custom:
    - name: "LiteLLM"
      apiKey: "${LITELLM_MASTER_KEY}"
      baseURL: "http://litellm:4000/v1"
      models:
        default: ["${GENERATION_MODEL}"]
        fetch: false
      titleConvo: true

mcpServers:
  nexus-rag-search:
    type: streamable-http
    url: "http://orchestration-mcp:8002/mcp"
    # Section 7.7: OBO token exchange is the recommended identity-propagation
    # mode -- exchanges the user's LibreChat session token for one scoped to
    # this MCP server's audience (the rag-app client) rather than forwarding
    # the whole-session token via addUserJwtToken.
    #
    # obo.scopes is a single space-delimited string (standard OAuth2 scope
    # parameter format, RFC 6749), not a JSON array -- confirmed against a
    # real LibreChat 0.8.7 instance's Zod validation error, which rejected
    # scopes: ["rag-query"] with "Expected string, received array" on every
    # union branch that otherwise matched this streamable-http+obo shape.
    obo:
      scopes: "rag-query"
    # orchestration-mcp's rag_search tool now reads the bearer token from the
    # forwarded Authorization header on this connection (verified against the
    # real MCP client SDK, see services/orchestration-mcp/app/server.py), so
    # whatever LibreChat puts on that header -- an OBO-exchanged token per the
    # obo.scopes above, or a raw addUserJwtToken-forwarded one -- reaches it
    # correctly. REMAINING GAP: Keycloak's fine-grained token-exchange admin
    # permission (required on top of the client's standard.token.exchange.enabled
    # attribute -- see the realm export's _comment) still needs a manual
    # admin-console step.

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{% block title %}nexus-rag{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    nav a { margin-right: 1rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 600; }
    input, select, textarea { width: 100%; padding: 0.4rem; margin-top: 0.25rem; box-sizing: border-box; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; }
    .row { display: flex; gap: 1rem; justify-content: space-between; align-items: center; border: 1px solid #ccc; padding: 0.5rem; margin-top: 0.5rem; }
    .msg { margin-top: 1rem; padding: 0.5rem; white-space: pre-wrap; }
    .msg.ok { background: #e6ffed; }
    .msg.err { background: #ffe6e6; }
    .hint { color: #666; font-size: 0.85rem; font-weight: normal; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Upload</a>
    <a href="/curate">Curation Queue</a>
    <a href="/notifications">Notifications</a>
    <a href="/auth/login">Log in</a>
    <a href="/auth/logout">Log out</a>
  </nav>
  <hr />
  {% block content %}{% endblock %}
  <script>
    // Auth is a browser session cookie now (ARCHITECTURE.md Section 4.4,
    // set by /auth/login -> /auth/callback) -- fetch() already sends it
    // same-origin, so there's no header to attach here. Kept as a no-op so
    // the existing `headers: authHeaders()` calls elsewhere don't need
    // touching.
    function authHeaders() {
      return {};
    }
  </script>
</body>
</html>

{% extends "base.html" %}
{% block title %}Upload — nexus-rag{% endblock %}
{% block content %}
<h1>Submit a document</h1>
<p>Fields marked * are mandatory per FR-2 -- submission is blocked without them.</p>
<form id="uploadForm">
  <label>File * <input type="file" name="file" required /></label>

  <label>Classification *
    <select name="classification" required>
      {% for value, rank in classifications %}
      <option value="{{ value }}">{{ value }}</option>
      {% endfor %}
    </select>
  </label>

  <label>Releasability * <span class="hint">(select one or more)</span>
    <select name="releasability" multiple required>
      {% for value in releasability %}
      <option value="{{ value }}">{{ value }}</option>
      {% endfor %}
    </select>
  </label>

  <label>Access scope * <span class="hint">(comma-separated orgs/groups/users, or PUBLIC)</span>
    <input type="text" name="access_scope" placeholder="PUBLIC or USAREUR-AF, Signal-Corps" required />
  </label>

  <label>Source / Originator * <input type="text" name="source_originator" required /></label>
  <label>Document type * <input type="text" name="doc_type" placeholder="Regulation, SOP, manual, data sheet..." required /></label>
  <label>Program / community <input type="text" name="program_community" /></label>
  <label>Effective date <input type="date" name="effective_date" /></label>
  <label>Supersedes document ID <span class="hint">(optional, FR-7 -- paste an existing approved document's ID to submit this as a new version. Checked at approval time against your org/clearance/releasability, and again against the document's own.)</span>
    <input type="text" name="supersedes_document_id" placeholder="leave blank for a new document" />
  </label>

  <button type="submit">Submit</button>
</form>
<div id="result" class="msg"></div>

<script>
document.getElementById('uploadForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const fd = new FormData();
  fd.append('file', form.file.files[0]);
  fd.append('classification', form.classification.value);
  fd.append('releasability', JSON.stringify(Array.from(form.releasability.selectedOptions).map(o => o.value)));
  const scope = form.access_scope.value.split(',').map(s => s.trim()).filter(Boolean);
  fd.append('access_scope', JSON.stringify(scope));
  fd.append('source_originator', form.source_originator.value);
  fd.append('doc_type', form.doc_type.value);
  if (form.program_community.value) fd.append('program_community', form.program_community.value);
  if (form.effective_date.value) fd.append('effective_date', form.effective_date.value);
  if (form.supersedes_document_id.value) fd.append('supersedes_document_id', form.supersedes_document_id.value.trim());

  const resultEl = document.getElementById('result');
  try {
    const res = await fetch('/documents', { method: 'POST', headers: authHeaders(), body: fd });
    const body = await res.json();
    resultEl.className = 'msg ' + (res.ok ? 'ok' : 'err');
    resultEl.textContent = JSON.stringify(body, null, 2);
    if (res.ok) {
      form.reset();
      pollStatus(body.id);
    }
  } catch (err) {
    resultEl.className = 'msg err';
    resultEl.textContent = String(err);
  }
});

// FR-8: submission returns 202 with status "queued" before parse/chunk/embed
// (FR-3..FR-6) has actually run; poll until it reaches a terminal state
// (pending_review or failed) instead of just showing the initial response.
const TERMINAL_STATUSES = ['pending_review', 'failed', 'approved', 'rejected', 'superseded'];

async function pollStatus(docId, attempt = 0) {
  const resultEl = document.getElementById('result');
  const res = await fetch(`/documents/${docId}`, { headers: authHeaders() });
  if (!res.ok) return;
  const doc = await res.json();
  resultEl.textContent = JSON.stringify(doc, null, 2);
  resultEl.className = 'msg ' + (doc.status === 'failed' ? 'err' : 'ok');
  if (!TERMINAL_STATUSES.includes(doc.status) && attempt < 30) {
    setTimeout(() => pollStatus(docId, attempt + 1), 1000);
  }
}
</script>
{% endblock %}
